spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: integrity-family
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:integrity_family}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&connectTimeout=10000&useUnicode=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:root}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 2000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
    port: ${SPRING_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
    username: ${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
    password: ${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:guest}}
    listener:
      simple:
        auto-startup: ${RABBITMQ_ENABLED:false}
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          max-interval: 10000ms
          multiplier: 2.0
    template:
      retry:
        enabled: false

server:
  port: 8080
  address: 0.0.0.0
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:always}
    include-binding-errors: ${SERVER_ERROR_INCLUDE_BINDING_ERRORS:always}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    rabbit:
      enabled: false

# ---------- Configuración de IA Refinada ----------
app:
  ai:
    voice:
      enabled: ${APP_AI_VOICE_ENABLED:false}
    anthropic:
      enabled: ${CLAUDE_ENABLED:true}
      api-key: ${CLAUDE_API_KEY:MOCK_KEY}
      model: ${CLAUDE_MODEL:claude-3-5-haiku-20241022}
      base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com/v1}
    openai:
      api-key: ${OPENAI_API_KEY:MOCK_KEY}
      whisper:
        enabled: ${WHISPER_ENABLED:false}
        url: ${APP_AI_OPENAI_WHISPER_URL:https://api.openai.com/v1/audio/transcriptions}
        model: ${APP_AI_OPENAI_WHISPER_MODEL:whisper-1}
        timeout-ms: ${APP_AI_OPENAI_WHISPER_TIMEOUT_MS:30000}
    elevenlabs:
      enabled: ${ELEVENLABS_ENABLED:false}
      api-key: ${ELEVENLABS_API_KEY:MOCK_KEY}
      voice-id: ${ELEVENLABS_VOICE_ID:MOCK_VOICE}
      model: ${ELEVENLABS_MODEL:eleven_multilingual_v2}
      base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io/v1}

logging:
  file:
    name: /app/logs/backend.log
  level:
    org.hibernate.SQL: WARN

# ---------- Configuración de Seguridad JWT ----------
integrity:
  security:
    jwt:
      secret: ${JWT_SECRET:aW50ZWdyaXR5RmFtaWx5U2VjcmV0S2V5Rm9yVGhlVW5pZmllZEludGVncml0eUVuZ2luZTIwMjY=}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}


---
# Perfil 'voice': activa toda la cadena de IA por voz
spring:
  config:
    activate:
      on-profile: voice
app:
  ai:
    voice:
      enabled: true
    openai:
      whisper:
        enabled: true
    elevenlabs:
      enabled: true

---
# Perfil 'prod': configuración para producción
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

server:
  error:
    include-message: never
    include-binding-errors: never

# Deshabilitar Swagger en producción
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.integrityfamily: INFO
    org.hibernate.SQL: WARN

---
# Perfil 'railway': despliegue en Railway.app
# Variables de entorno requeridas en el servicio Railway:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
#   JWT_SECRET, CLAUDE_API_KEY (opcional)
spring:
  config:
    activate:
      on-profile: railway
  jpa:
    hibernate:
      ddl-auto: update     # Railway recrea el contenedor en cada deploy
    show-sql: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false  # Sin RabbitMQ en Railway (plano Starter)

# Logs a stdout — Railway los captura automáticamente
logging:
  file:
    name: ""               # Sin archivo de log en Railway
  level:
    com.integrityfamily: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    rabbit:
      enabled: false

---
# Perfil 'render': despliegue en Render.com
# Variables de entorno requeridas en el dashboard de Render:
#   SPRING_DATASOURCE_URL  → jdbc:mysql://<RAILWAY_PUBLIC_HOST>:<PORT>/<DB>?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
#   SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
#   JWT_SECRET, CLAUDE_API_KEY (opcional)
spring:
  config:
    activate:
      on-profile: render
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

logging:
  file:
    name: ""
  level:
    com.integrityfamily: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    rabbit:
      enabled: false
